<html>

<title>Typography fter class project</title>

<style>

.heading{
           font-weight:bolder;
           text-align: center;
           text-shadow:5px 7px 5px red ;
}


.p1 {

color: blueviolet;

font-family: 'Courier New';
font-size: 80px;
font-weight:bold;
text-shadow:5px 7px 5px red;     /* the first value is for horizontal shadow and the second value is for vertical shadow and the third value is for blur radius and the last value is for color of shadow */


}
.box {
    width: 100px;
    height: 100px;
    background-color: blue;
    transform: translate(400px, 900px) rotate(127deg) scale(6.7) skew(67deg, 76deg);   /*u can write all the transform properties */
                                                                                      /*line by line in thir next line by giving*/
                                                                                        /* transform:their name(...),but */
                                                                                        /* to make it simple we have written all of that in the same line  */
    

    box-shadow:-5px -7px 5px yellow;   /* the first value is for horizontal shadow and the second value is for vertical shadow and the third value is for blur radius and the last value is for color of shadow */




}

</style>

<body>

<h1 class="heading">Typography after class project</h1>



<p class="p1">Welcome to codingal</p>

<div class="box">
</div>


</body>

</html>
